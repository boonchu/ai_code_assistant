name: OpenAI Gemma 8B Configuration
version: 1.0.0
schema: v1
models:
  - name: gemma 8B
    provider: "openai"
    model: gemma4:E4B
    apiBase: http://localhost:8080/v1
    roles:
      - chat
      - edit
      - apply
      - autocomplete
      - embed
    contextLength: 8192 # Adjust context window size
    completionOptions:
      temperature: 0.7 # Controls randomness (0.0-1.0)
      top_p: 0.9 # Nucleus sampling threshold
      top_k: 40 # Top-k sampling
      num_predict: 2048 # Max tokens to generate