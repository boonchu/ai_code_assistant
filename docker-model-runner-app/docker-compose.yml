services:
  # 0. Must have a GPU available to run the model, so we check for that first
  gpu-check:
    image: nvidia/cuda:13.0.2-devel-ubuntu24.04
    container_name: gpu-check
    command: >
      sh -c "if command -v nvidia-smi > /dev/null 2>&1 && nvidia-smi --query --display=COMPUTE > /dev/null 2>&1; then
        return 0
      else
        return 1
      fi"
    deploy:
      resources:
        limits:
          memory: 2G      # Hard limit: Container will be killed if exceeded
        reservations:
          memory: 2G      # Soft limit: Minimum memory guaranteed to the container
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  # 1. Downloads Gemma model from Docker Hub
  docker-runner:
    provider:
      type: model
      options:
        model: ai/gemma4:E4B
        gpu: true
    depends_on:
      - gpu-check
  # 2. WebUI test
  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: webui
    ports:
      - "3000:8080"
    environment:
      # One stable URL from any container → host's Docker Model Runner
      - OPENAI_API_BASE_URL=http://host.docker.internal:12434/engines/v1
      - OPENAI_API_KEY=local-key
      - WEBUI_NAME=Open WebUI - Local LLM via Docker Model Runner
    extra_hosts:
      # Makes host.docker.internal work on Linux too
      - "host.docker.internal:host-gateway"
    depends_on:
      - docker-runner 
  # 2. Runs app server
  # app:
  #   # if downloading the image from Docker Hub, use the line below. If building locally, use the line after that
  #   # image: ghcr.io/ggml-org/llama.cpp:server-cuda
  #   image: local/llm
  #   container_name: llm
  #   depends_on:
  #     model-download:
  #       condition: service_completed_successfully
  #   ports:
  #     - "8080:8080"
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 4G      # Hard limit: Container will be killed if exceeded
  #       reservations:
  #         memory: 4G      # Soft limit: Minimum memory guaranteed to the container
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]
  #   extra_hosts:
  #     # Makes host.docker.internal work on Linux too
  #     - "host.docker.internal:host-gateway"
  #   networks:
  #     - shared-network    
  # 3. Runs the monitoring dashboard to visualize GPU usage and model performance
  mointor:
    image: ghcr.io/psalias2006/gpu-hot:latest
    container_name: mointor
    ports:
      - "1312:1312"
    depends_on:
      webui:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M      # Hard limit: Container will be killed if exceeded
        reservations:
          memory: 512M      # Soft limit: Minimum memory guaranteed to the container
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

networks:
  shared-network:
    external: true
    name: ai-network