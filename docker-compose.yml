services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Override command to pull the model on startup
    entrypoint: /bin/sh
    command: >
      -c "ollama serve & 
          sleep 5; 
          ollama pull gemma4; 
          wait"
    # GPU support (optional but recommended for Gemma 4)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  ollama_data:
